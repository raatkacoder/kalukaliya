<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="icon" href="https://www.instagram.com/static/images/ico/favicon-192.png/68d99ba29cc8.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #262626;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 935px;
            width: 100%;
            padding: 20px 0;
        }

        /* Phone Mockup */
        .phone-container {
            flex-basis: 454px;
            height: 618px;
            background-image: url('https://static.cdninstagram.com/images/instagram/xig/homepage/phones/home-phones.png?__makehaste_cache_breaker=HOgRclNOosk');
            background-position: 0 0;
            background-size: 454px 618px;
            background-repeat: no-repeat;
            position: relative;
            margin-right: 32px;
            flex-shrink: 0;
        }

        .phone-container .screenshot {
            position: absolute;
            top: 99px;
            right: 59px;
            width: 250px;
            height: 538px;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .phone-container .screenshot.active {
            opacity: 1;
        }

        /* Right Side */
        .right-container {
            display: flex;
            flex-direction: column;
            flex-basis: 350px;
            flex-shrink: 0;
        }

        /* Login Box */
        .login-box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 10px 0;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .instagram-logo {
            font-family: 'Grand Hotel', cursive, 'Billabong', sans-serif;
            background-image: url('https://i.imgur.com/zqpwkLQ.png');
            background-repeat: no-repeat;
            background-position: 0 -130px;
            background-size: 175px;
            height: 51px;
            width: 175px;
            margin: 22px auto 12px;
        }

        /* Using text fallback for the logo */
        .logo-text {
            font-family: 'Cookie', cursive, 'Grand Hotel', cursive;
            font-size: 50px;
            margin: 22px auto 12px;
            text-align: center;
            color: #262626;
        }

        /* SVG Instagram Logo */
        .logo-svg {
            margin: 22px auto 12px;
            text-align: center;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            width: 268px;
            margin-top: 16px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 6px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            overflow: hidden;
        }

        .input-wrapper input {
            width: 100%;
            border: none;
            outline: none;
            padding: 14px 8px 2px;
            font-size: 12px;
            background: transparent;
            line-height: 18px;
        }

        .input-wrapper label {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: #8e8e8e;
            pointer-events: none;
            transition: all 0.1s ease;
        }

        .input-wrapper input:focus + label,
        .input-wrapper input:not(:placeholder-shown) + label {
            top: 10px;
            font-size: 10px;
            transform: translateY(-50%);
        }

        .input-wrapper input:focus {
            border-color: #a8a8a8;
        }

        .input-wrapper:focus-within {
            border-color: #a8a8a8;
        }

        .password-wrapper {
            position: relative;
        }

        .show-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: #262626;
            cursor: pointer;
        }

        .show-password:hover {
            color: #8e8e8e;
        }

        .login-btn {
            margin-top: 8px;
            padding: 7px 16px;
            background-color: #0095f6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .login-btn.active {
            opacity: 1;
        }

        .login-btn:hover {
            opacity: 0.85;
        }

        .login-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 18px 40px;
            width: 268px;
        }

        .divider .line {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .divider span {
            padding: 0 18px;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Facebook Login */
        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 8px 0;
            cursor: pointer;
            background: none;
            border: none;
        }

        .fb-login svg {
            margin-right: 8px;
        }

        .fb-login span {
            color: #385185;
            font-size: 14px;
            font-weight: 600;
        }

        /* Forgot Password */
        .forgot-password {
            margin: 16px 0;
        }

        .forgot-password a {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        /* Signup Box */
        .signup-box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 22px 0;
            text-align: center;
            margin-bottom: 10px;
        }

        .signup-box p {
            font-size: 14px;
            color: #262626;
        }

        .signup-box a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        .signup-box a:hover {
            text-decoration: underline;
        }

        /* App Download */
        .app-download {
            text-align: center;
            margin: 10px 0;
        }

        .app-download p {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .app-badges {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .app-badges img {
            height: 40px;
        }

        /* Footer */
        .footer {
            max-width: 1024px;
            width: 100%;
            padding: 0 20px;
            margin: 0 auto;
        }

        .footer-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 16px;
        }

        .footer-nav a {
            color: #8e8e8e;
            font-size: 12px;
            text-decoration: none;
            margin: 0 8px 12px;
        }

        .footer-nav a:hover {
            text-decoration: underline;
        }

        .footer-bottom {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .footer-bottom select {
            color: #8e8e8e;
            font-size: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .footer-bottom span {
            color: #8e8e8e;
            font-size: 12px;
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        .footer {
            margin-top: auto;
            padding-bottom: 52px;
            padding-top: 24px;
        }

        @media (max-width: 875px) {
            .phone-container {
                display: none;
            }
        }

        @media (max-width: 450px) {
            .login-box,
            .signup-box {
                border: none;
                background: transparent;
            }
            body {
                background-color: #fff;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cookie&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <div class="main-container">
            <!-- Phone Image -->
            <div class="phone-container">
            </div>

            <!-- Right Side -->
            <div class="right-container">
                <!-- Login Box -->
                <div class="login-box">
                    <!-- Instagram Logo -->
                    <div class="logo-svg">
                        <svg aria-label="Instagram" width="175" height="51" viewBox="0 0 175 51">
                            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" 
                                  font-family="'Cookie', cursive" font-size="48" fill="#262626">
                                Instagram
                            </text>
                        </svg>
                    </div>

                    <!-- Login Form -->
                    <form class="login-form" id="loginForm">
                        <div class="input-wrapper">
                            <input type="text" id="username" placeholder=" " autocomplete="username" name="username">
                            <label for="username">Phone number, username, or email</label>
                        </div>
                        <div class="input-wrapper password-wrapper">
                            <input type="password" id="password" placeholder=" " autocomplete="current-password" name="password">
                            <label for="password">Password</label>
                            <button type="button" class="show-password" id="togglePassword" style="display:none;">Show</button>
                        </div>
                        <button type="submit" class="login-btn" id="loginBtn" disabled>Log in</button>
                    </form>

                    <!-- Divider -->
                    <div class="divider">
                        <div class="line"></div>
                        <span>OR</span>
                        <div class="line"></div>
                    </div>

                    <!-- Facebook Login -->
                    <button class="fb-login">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="#385185">
                            <path d="M22.675 0h-21.35C.595 0 0 .593 0 1.325v21.351C0 23.407.595 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116C23.407 24 24 23.407 24 22.675V1.325C24 .593 23.407 0 22.675 0z"/>
                        </svg>
                        <span>Log in with Facebook</span>
                    </button>

                    <!-- Forgot Password -->
                    <div class="forgot-password">
                        <a href="#">Forgot password?</a>
                    </div>
                </div>

                <!-- Signup Box -->
                <div class="signup-box">
                    <p>Don't have an account? <a href="#">Sign up</a></p>
                </div>

                <!-- App Download -->
                <div class="app-download">
                    <p>Get the app.</p>
                    <div class="app-badges">
                        <a href="#">
                            <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-Klz.png" alt="Get it on Google Play">
                        </a>
                        <a href="#">
                            <img src="https://static.cdninstagram.com/rsrc.php/v3/yu/r/EHY6QnZYdNX.png" alt="Get it from Microsoft">
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <nav class="footer-nav">
                <a href="#">Meta</a>
                <a href="#">About</a>
                <a href="#">Blog</a>
                <a href="#">Jobs</a>
                <a href="#">Help</a>
                <a href="#">API</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Locations</a>
                <a href="#">Instagram Lite</a>
                <a href="#">Threads</a>
                <a href="#">Contact Uploading & Non-Users</a>
                <a href="#">Meta Verified</a>
            </nav>
            <div class="footer-bottom">
                <select>
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="pt">Português (Brasil)</option>
                    <option value="it">Italiano</option>
                    <option value="zh">中文(简体)</option>
                    <option value="ar">العربية</option>
                    <option value="hi">हिन्दी</option>
                </select>
                <span>© 2024 Instagram from Meta</span>
            </div>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const togglePassword = document.getElementById('togglePassword');

        // Enable/disable login button
        function checkInputs() {
            if (usernameInput.value.trim() !== '' && passwordInput.value.trim() !== '') {
                loginBtn.disabled = false;
                loginBtn.classList.add('active');
            } else {
                loginBtn.disabled = true;
                loginBtn.classList.remove('active');
            }
        }

        usernameInput.addEventListener('input', checkInputs);
        passwordInput.addEventListener('input', checkInputs);

        // Show/Hide password toggle
        passwordInput.addEventListener('input', function() {
            if (this.value.length > 0) {
                togglePassword.style.display = 'block';
            } else {
                togglePassword.style.display = 'none';
            }
        });

        togglePassword.addEventListener('click', function() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                this.textContent = 'Show';
            }
        });

        // Prevent form submission (demo only)
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('This is a demo page. Login functionality is not implemented.');
        });
    </script>
</body>
</html>
